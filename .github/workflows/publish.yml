name: Publish to PyPI

on:
  release:
    types: [published]

concurrency:
  group: pypi-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Verify release tag matches package version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          metadata = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          expected_tag = f"v{metadata['project']['version']}"
          actual_tag = os.environ["GITHUB_REF_NAME"]
          if actual_tag != expected_tag:
              raise SystemExit(
                  f"Release tag {actual_tag!r} does not match package version {expected_tag!r}"
              )
          print(f"Publishing {expected_tag}")
          PY
      - name: Build distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/custom-dl-optimizer/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: package-distributions
          path: dist/
      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
