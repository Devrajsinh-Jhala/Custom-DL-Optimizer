name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check custom_dl_optimizer tests examples
      - name: Test
        run: python -m pytest
      - name: Validate static site
        run: python tools/validate_site.py

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Build and validate distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: Test wheel installation
        run: |
          python -m pip install torch
          python -m pip install --no-deps --force-reinstall dist/*.whl
          python - <<'PY'
          import torch
          import torch.nn as nn
          import custom_dl_optimizer as cdl

          policy = cdl.OptimizationPolicy(
              enable_profiling=False,
              enable_fx=False,
              enable_triton=False,
              enable_amp=False,
              channels_last=False,
              measurement=cdl.MeasurementPolicy(
                  warmup=0,
                  iterations=2,
                  repeats=1,
                  bootstrap_resamples=100,
                  measure_peak_memory=False,
              ),
          )
          decision = cdl.InferenceOptimizer(
              target=cdl.ExecutionTarget("cpu"),
              policy=policy,
          ).select_signature(nn.Identity(), torch.ones(2))
          assert cdl.__version__ == "3.0.0"
          assert decision.report.schema_version == 3
          print(cdl.__version__, decision.selected_plan)
          PY
      - uses: actions/upload-artifact@v7
        with:
          name: package-distributions
          path: dist/
          if-no-files-found: error
